kind = "web"
previewPath = "/"
title = "SwiftLingo"
version = "1.0.0"
id = "artifacts/swiftlingo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24405

[services.development]
run = "pnpm --filter @workspace/swiftlingo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/swiftlingo", "run", "build" ]
publicDir = "artifacts/swiftlingo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24405"
BASE_PATH = "/"
